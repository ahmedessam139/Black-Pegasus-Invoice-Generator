<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Pegasus Invoice Generator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #eef6ff 0%, #f8fbff 50%, #ffffff 100%);
        margin: 20px;
        color: #102a43;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
        padding: 20px;
        box-shadow: 0 12px 30px rgba(11, 70, 132, 0.12);
        border-radius: 14px;
        border: 1px solid #d9e8f8;
      }
      textarea {
        width: 100%;
        height: 150px;
        margin-bottom: 20px;
        padding: 10px;
      }
      input,
      textarea,
      select {
        width: 90%;
        padding: 10px;
        margin: 5px 0 5px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      button {
        padding: 10px 20px;
        margin: 5px 0;
        background: linear-gradient(135deg, #22b8ff, #2f80ed);
        color: #ffffff;
        border: 1px solid #1b6ad6;
        cursor: pointer;
        border-radius: 8px;
        font-weight: 600;
        box-shadow: 0 5px 12px rgba(47, 128, 237, 0.25);
      }
      button:hover {
        background: linear-gradient(135deg, #1ea6e6, #2469ca);
      }
      .invoice-table {
        width: 100%;
        min-width: 760px;
        border-collapse: separate;
        border-spacing: 0;
        margin-bottom: 20px;
        border: 1px solid #d4dbe6;
        border-radius: 12px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 8px 20px rgba(16, 24, 40, 0.08);
      }
      .invoice-table th,
      .invoice-table td {
        padding: 10px 8px;
        text-align: center;
        font-size: 14px;
        border-bottom: 1px solid #e7edf5;
      }
      .invoice-table th {
        background: linear-gradient(135deg, #dff3ff, #cfe9ff);
        color: #0b3b66;
        font-weight: 700;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .invoice-table tr:nth-child(even) td {
        background: #f8fbff;
      }
      .invoice-table tr:hover td {
        background: #eef6ff;
      }
      .invoice-table .item-total {
        font-weight: 700;
        color: #0b6bcb;
      }
      .invoice-table .size-value {
        font-weight: 700;
      }
      #invoiceContent {
        overflow-x: auto;
      }
      input {
        width: 100%;
        border: none;
        background: transparent;
        text-align: center;
      }
      .total-section {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
      }
      .total-after-shipping {
        background: linear-gradient(135deg, #e9f7ff, #d9efff);
        color: #0d4e8f;
        padding: 12px 16px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 18px;
        text-align: center;
        box-shadow: 0 4px 12px rgba(13, 78, 143, 0.18);
        margin: 10px 0;
        border: 2px solid #9dd0fb;
      }
      select {
        padding: 5px;
      }
      h1 {
        text-align: center;
        color: #0c3f6d;
        letter-spacing: 0.3px;
      }
      .customer-info {
        margin-bottom: 12px;
        padding: 8px 10px;
        border: 1px solid #dbe7f3;
        background: #fbfdff;
        border-radius: 8px;
      }
      .customer-info h3 {
        margin: 0 0 6px 0;
        color: #0c3f6d;
        font-size: 13px;
        letter-spacing: 0.1px;
      }
      .customer-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px 10px;
      }
      .customer-item {
        display: flex;
        align-items: baseline;
        gap: 4px;
        min-width: 0;
        padding: 0;
      }
      .customer-item.full-width {
        grid-column: 1 / -1;
      }
      .customer-label {
        flex: 0 0 auto;
        font-size: 11px;
        color: #5f7f9f;
        font-weight: 700;
      }
      .customer-value {
        color: #123b63;
        font-weight: 500;
        font-size: 12px;
        line-height: 1.25;
        word-break: break-word;
      }
      .customer-info p {
        margin: 5px 0;
      }
      .logo {
        display: block;
        margin: 0 auto;
        width: 230px;
      }
      .output {
        padding: 20px;
        margin-top: 20px;
      }
      @media (max-width: 768px) {
        .customer-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media print {
        body {
          background: #ffffff;
        }
        .container {
          box-shadow: none;
          border: 1px solid #d7e6f4;
        }
        .customer-info {
          margin-bottom: 8px;
          padding: 6px 8px;
          border-color: #cfdceb;
        }
        .customer-grid {
          gap: 4px 8px;
        }
        .customer-info h3 {
          margin-bottom: 4px;
          font-size: 12px;
        }
        .customer-label,
        .customer-value {
          font-size: 10.5px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container" id="invoiceContainer">
      <h1>Black Pegasus Invoice Generator</h1>
      <textarea
        id="orderMessage"
        placeholder="Paste your order message here..."
      ></textarea>
      <br />
      <button onclick="generateInvoice()">Generate Invoice</button>
      <button onclick="downloadPDF()">Download as PDF</button>
      <button onclick="sortBySize()" id="sortButton" style="display: none">
        Sort by Size
      </button>

      <div id="output" class="output">
        <h2></h2>
        <!-- put logo here -->
        <img
          src="./logo.png"
          alt="Black Pegasus Logo"
          class="logo"
          crossorigin="anonymous"
        />
        <div id="invoiceContent"></div>
      </div>
    </div>

    <!-- Add jsPDF library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>

    <script>
      let orderID = null;
      let totalPrice = 0;
      let currentItems = []; // Store items globally for sorting
      let sizeColorMap = {};
      const sizeColorPalette = [
        "#0369a1",
        "#4338ca",
        "#0f766e",
        "#a16207",
        "#be185d",
        "#166534",
        "#92400e",
        "#1d4ed8",
      ];
      function generateInvoice() {
        orderID = generateOrderID();
        const message = document.getElementById("orderMessage").value;
        if (!message) {
          alert("Please paste your order message.");
          return;
        }

        const outputDiv = document.getElementById("invoiceContent");
        outputDiv.innerHTML = "";

        const itemPattern =
          /(\d+)x\s(.*?)\((.*?)\)\s*-\s*(\d+)\s*EGP\s*\[Code:\s*(\w+)\]/g;
        const items = [];
        let match;

        while ((match = itemPattern.exec(message)) !== null) {
          items.push({
            quantity: parseInt(match[1]),
            name: match[2].trim(),
            size: match[3].trim(),
            unitPrice: parseFloat(match[4]),
            itemCode: match[5].trim(),
          });
        }

        // Store items globally for sorting
        currentItems = items;
        sizeColorMap = {};

        // Show sort button if there are items
        if (items.length > 0) {
          document.getElementById("sortButton").style.display = "inline-block";
        } else {
          document.getElementById("sortButton").style.display = "none";
        }

        // Customer Info
        // Define the regex patterns
        const patterns = {
          name: /Name:\s*(.*?)\n/,
          phone: /Phone:\s*(.*?)\n/,
          address: /Address:\s*([\s\S]*?)\s*City:/,
          city: /City:\s*(.*?)\n/,
          notes: /Notes:\s*(.*)/,
        };

        // Function to extract customer information
        const extractCustomerInfo = (message) => {
          const customerInfo = {};

          for (const [key, pattern] of Object.entries(patterns)) {
            const match = message.match(pattern);
            if (match) {
              customerInfo[key] = match[1].trim();
            }
          }

          return customerInfo;
        };

        // Extract the customer info
        const customerInfo = extractCustomerInfo(message);

        let tableHTML =
          "<table class='invoice-table'><tr><th>#</th><th>Item Name</th><th>Size</th><th>Qty (pcs)</th><th>Unit Price (EGP)</th><th>Price (EGP)</th><th>Item Code</th></tr>";

        let totalQty = 0;
        totalPrice = 0;

        items.forEach((item, index) => {
          const quantity = parseFloat(item.quantity) || 0;
          const unitPrice = parseFloat(item.unitPrice) || 0;
          const total = (quantity * unitPrice).toFixed(2);

          totalQty += quantity;
          totalPrice += parseFloat(total);

          tableHTML += ` 
    <tr>
      <td>${index + 1}</td>  <!-- Row count -->
      <td>${item.name}</td>
      <td><span class="size-value" style="color: ${getSizeColor(item.size)}">${item.size}</span></td>
      <td>${item.quantity} pcs</td>
      <td>${item.unitPrice}</td>
      <td class="item-total">${total}</td>
      <td>${item.itemCode}</td>
    </tr>
  `;
        });

        // Calculate total sizes
        const totalSizes = calculateTotalSizes(items);

        // Add the total row at the end
        tableHTML += `
  <tr>
    <td colspan="2"><strong>Total</strong></td>
    <td><strong>${totalSizes} ml</strong></td>
    <td><strong>${totalQty} pcs</strong></td>
    <td>--</td>  
    <td><strong>${totalPrice.toFixed(2)}</strong></td>
    <td>--</td>  
  </tr>
`;

        tableHTML += "</table>";

        const shippingOptions = [
          0,
          ...Array.from({ length: 30 }, (_, i) => (i + 1) * 10),
        ]
          .map((fee) => `<option value="${fee}">${fee} EGP</option>`)
          .join("");

        const deliveryOptions = Array.from({ length: 15 }, (_, i) => i + 1)
          .map((day) => `<option value="${day}">${day} days</option>`)
          .join("");

        const totalSectionHTML = `
                <div class="total-section">
                    <div>
                        <label>Shipping Fee: </label>
                        <select id="shippingFee" onchange="updateTotal()">
                            ${shippingOptions}
                        </select>
                    </div>
                    <div>
                        <label>Estimated Delivery: </label>
                        <select id="deliveryTime">
                            ${deliveryOptions}
                        </select>
                    </div>
                    <div>
                        <p><strong>Total Before Shipping:</strong> <span id="totalBefore"></span> EGP</p>
                        <p><strong>Shipping Fee:</strong> <span id="shippingFeeDisplay">0</span> EGP</p>
                    </div>
                </div>
                <div class="total-after-shipping">
                    <strong>Grand Total : <span id="totalAfter"></span> EGP</strong>
                </div>
                <p><strong>Invoice Generated:</strong> ${generateTimestamp()}</p>
                <p><strong>Order ID:</strong> ${orderID}</p>
            `;

        const customerInfoHTML = `
                <div class="customer-info">
                    <h3>Customer Information</h3>
                    <div class="customer-grid">
                      <div class="customer-item">
                        <span class="customer-label">Name:</span>
                        <span class="customer-value">${customerInfo.name || "-"}</span>
                      </div>
                      <div class="customer-item">
                        <span class="customer-label">Phone:</span>
                        <span class="customer-value">${customerInfo.phone || "-"}</span>
                      </div>
                      <div class="customer-item">
                        <span class="customer-label">City:</span>
                        <span class="customer-value">${customerInfo.city || "-"}</span>
                      </div>
                      <div class="customer-item full-width">
                        <span class="customer-label">Address:</span>
                        <span class="customer-value">${customerInfo.address || "-"}</span>
                      </div>
                      <div class="customer-item full-width">
                        <span class="customer-label">Notes:</span>
                        <span class="customer-value">${customerInfo.notes || "-"}</span>
                      </div>
                    </div>
                </div>
            `;

        outputDiv.innerHTML = customerInfoHTML + tableHTML + totalSectionHTML;
        updateTotal();
      }

      function updateTotal() {
        let totalBefore = 0;

        totalBefore = totalPrice.toFixed(2);

        console.log(totalBefore);

        // Get the shipping fee value and ensure it's a number
        const shippingFee =
          parseFloat(document.getElementById("shippingFee").value) || 0;

        // Update the totalBefore, shippingFeeDisplay, and totalAfter elements
        document.getElementById("totalBefore").innerText = totalBefore;
        document.getElementById("shippingFeeDisplay").innerText = shippingFee;
        document.getElementById("totalAfter").innerText =
          parseFloat(totalBefore) + shippingFee;
      }

      function generateTimestamp() {
        const now = new Date();
        now.setHours(now.getHours() + 2); // Add 2 hours to the current time
        const dateStr = now.toISOString().slice(0, 16).replace("T", " ");
        return dateStr;
      }

      function generateOrderID() {
        const timestamp = generateTimestamp().replace(/\D/g, "").slice(0, 12); // YYYYMMDDHHMM
        const randomDigits = Math.floor(1000 + Math.random() * 9000);
        return `${timestamp}-${randomDigits}`;
      }

      function getSizeColor(sizeText) {
        const key = (sizeText || "").trim().toLowerCase();
        if (!key) {
          return "#0b3b66";
        }
        if (!sizeColorMap[key]) {
          const colorIndex = Object.keys(sizeColorMap).length % sizeColorPalette.length;
          sizeColorMap[key] = sizeColorPalette[colorIndex];
        }
        return sizeColorMap[key];
      }

      // Function to extract numbers from size text
      function extractSizeNumber(sizeText) {
        // Remove all non-numeric characters except dots and commas
        const numbers = sizeText.match(/\d+(?:\.\d+)?/g);
        if (numbers && numbers.length > 0) {
          // Return the first number found, converted to float
          return parseFloat(numbers[0]);
        }
        // If no number found, return 0 for sorting purposes
        return 0;
      }

      // Function to calculate total of all sizes
      function calculateTotalSizes(items) {
        let totalSizes = 0;
        items.forEach((item) => {
          const sizeNumber = extractSizeNumber(item.size);
          const quantity = parseFloat(item.quantity) || 0;
          totalSizes += sizeNumber * quantity;
        });
        return Math.round(totalSizes); // Return as integer
      }

      // Function to sort items by size
      function sortBySize() {
        if (currentItems.length === 0) {
          alert("No items to sort. Please generate an invoice first.");
          return;
        }

        // Sort items by extracted size numbers
        const sortedItems = [...currentItems].sort((a, b) => {
          const sizeA = extractSizeNumber(a.size);
          const sizeB = extractSizeNumber(b.size);
          return sizeA - sizeB;
        });

        // Update the global items array
        currentItems = sortedItems;

        // Regenerate the table with sorted items
        regenerateTable();
      }

      // Function to regenerate the table with current items
      function regenerateTable() {
        const outputDiv = document.getElementById("invoiceContent");

        // Clear the content
        outputDiv.innerHTML = "";

        // Generate new table
        let tableHTML =
          "<table class='invoice-table'><tr><th>#</th><th>Item Name</th><th>Size</th><th>Qty (pcs)</th><th>Unit Price (EGP)</th><th>Price (EGP)</th><th>Item Code</th></tr>";

        let totalQty = 0;
        totalPrice = 0;

        currentItems.forEach((item, index) => {
          const quantity = parseFloat(item.quantity) || 0;
          const unitPrice = parseFloat(item.unitPrice) || 0;
          const total = (quantity * unitPrice).toFixed(2);

          totalQty += quantity;
          totalPrice += parseFloat(total);

          tableHTML += ` 
    <tr>
      <td>${index + 1}</td>  <!-- Row count -->
      <td>${item.name}</td>
      <td><span class="size-value" style="color: ${getSizeColor(item.size)}">${item.size}</span></td>
      <td>${item.quantity} pcs</td>
      <td>${item.unitPrice}</td>
      <td class="item-total">${total}</td>
      <td>${item.itemCode}</td>
    </tr>
  `;
        });

        // Calculate total sizes
        const totalSizes = calculateTotalSizes(currentItems);

        // Add the total row at the end
        tableHTML += `
  <tr>
    <td colspan="2"><strong>Total</strong></td>
    <td><strong>${totalSizes} ml</strong></td>
    <td><strong>${totalQty} pcs</strong></td>
    <td>--</td>  
    <td><strong>${totalPrice.toFixed(2)}</strong></td>
    <td>--</td>  
  </tr>
`;

        tableHTML += "</table>";

        // Recreate the total section with shipping options
        const shippingOptions = [
          0,
          ...Array.from({ length: 30 }, (_, i) => (i + 1) * 10),
        ]
          .map((fee) => `<option value="${fee}">${fee} EGP</option>`)
          .join("");

        const deliveryOptions = Array.from({ length: 15 }, (_, i) => i + 1)
          .map((day) => `<option value="${day}">${day} days</option>`)
          .join("");

        const totalSectionHTML = `
                <div class="total-section">
                    <div>
                        <label>Shipping Fee: </label>
                        <select id="shippingFee" onchange="updateTotal()">
                            ${shippingOptions}
                        </select>
                    </div>
                    <div>
                        <label>Estimated Delivery: </label>
                        <select id="deliveryTime">
                            ${deliveryOptions}
                        </select>
                    </div>
                    <div>
                        <p><strong>Total Before Shipping:</strong> <span id="totalBefore"></span> EGP</p>
                        <p><strong>Shipping Fee:</strong> <span id="shippingFeeDisplay">0</span> EGP</p>
                    </div>
                </div>
                <div class="total-after-shipping">
                    <strong>Total After Shipping: <span id="totalAfter"></span> EGP</strong>
                </div>
                <p><strong>Invoice Generated:</strong> ${generateTimestamp()}</p>
                <p><strong>Order ID:</strong> ${orderID}</p>
            `;

        // Recreate customer info (we need to extract it from the original message)
        const message = document.getElementById("orderMessage").value;
        const patterns = {
          name: /Name:\s*(.*?)\n/,
          phone: /Phone:\s*(.*?)\n/,
          address: /Address:\s*([\s\S]*?)\s*City:/,
          city: /City:\s*(.*?)\n/,
          notes: /Notes:\s*(.*)/,
        };

        const extractCustomerInfo = (message) => {
          const customerInfo = {};
          for (const [key, pattern] of Object.entries(patterns)) {
            const match = message.match(pattern);
            if (match) {
              customerInfo[key] = match[1].trim();
            }
          }
          return customerInfo;
        };

        const customerInfo = extractCustomerInfo(message);
        const customerInfoHTML = `
                <div class="customer-info">
                    <h3>Customer Information</h3>
                    <div class="customer-grid">
                      <div class="customer-item">
                        <span class="customer-label">Name:</span>
                        <span class="customer-value">${customerInfo.name || "-"}</span>
                      </div>
                      <div class="customer-item">
                        <span class="customer-label">Phone:</span>
                        <span class="customer-value">${customerInfo.phone || "-"}</span>
                      </div>
                      <div class="customer-item">
                        <span class="customer-label">City:</span>
                        <span class="customer-value">${customerInfo.city || "-"}</span>
                      </div>
                      <div class="customer-item full-width">
                        <span class="customer-label">Address:</span>
                        <span class="customer-value">${customerInfo.address || "-"}</span>
                      </div>
                      <div class="customer-item full-width">
                        <span class="customer-label">Notes:</span>
                        <span class="customer-value">${customerInfo.notes || "-"}</span>
                      </div>
                    </div>
                </div>
            `;

        // Rebuild the content
        outputDiv.innerHTML = customerInfoHTML + tableHTML + totalSectionHTML;
        updateTotal();
      }

      async function downloadPDF() {
        const element = document.getElementById("output");
        const logo = document.querySelector(".logo");
        if (logo && !logo.complete) {
          await new Promise((resolve) => {
            logo.onload = resolve;
            logo.onerror = resolve;
          });
        }
        const options = {
          filename: `${orderID}.pdf`,
          margin: [10, 0, 10, 0], // top, right, bottom, left in millimeters (mm)
          html2canvas: {
            scale: 2,
            useCORS: true,
            allowTaint: false,
            backgroundColor: "#ffffff",
          },
          jsPDF: {
            unit: "mm",
            format: "a4",
            orientation: "portrait",
          },
        };

        html2pdf().from(element).set(options).save();
      }
    </script>
  </body>
</html>
