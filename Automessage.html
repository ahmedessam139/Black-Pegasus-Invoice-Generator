<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Pegasus Invoice Generator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        margin: 20px;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background-color: #fff;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }
      textarea {
        width: 100%;
        height: 150px;
        margin-bottom: 20px;
        padding: 10px;
      }
      input,
      textarea,
      select {
        width: 90%;
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      button {
        padding: 10px 20px;
        margin: 5px 0;
        background-color: #4caf50;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
      }
      button:hover {
        background-color: #45a049;
      }
      button.pdf-btn-price {
        background-color: #1976d2;
      }
      button.pdf-btn-price:hover {
        background-color: #1565c0;
      }
      button.pdf-btn-noprice {
        background-color: #7b1fa2;
      }
      button.pdf-btn-noprice:hover {
        background-color: #6a1b9a;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }
      table,
      th,
      td {
        border: 1px solid #ccc;
      }
      th,
      td {
        padding: 5px;
        text-align: center;
        font-size: 16px;
      }
      input {
        width: 100%;
        border: none;
        background: transparent;
        text-align: center;
      }
      .total-section {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
      }
      .total-after-shipping {
        background: linear-gradient(135deg, #4caf50, #45a049);
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 18px;
        text-align: center;
        box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3);
        margin: 10px 0;
        border: 2px solid #2e7d32;
      }
      select {
        padding: 5px;
      }
      h1 {
        text-align: center;
        color: #333;
      }
      .customer-info {
        margin-bottom: 20px;
        padding: 10px;
        border: 1px solid #ccc;
        background-color: #f9f9f9;
      }
      .customer-info p {
        margin: 5px 0;
      }
      .logo {
        display: block;
        margin: 0 auto;
        width: 230px;
      }
      .output {
        padding: 20px;
        margin-top: 20px;
      }
      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container" id="invoiceContainer">
      <h1>Black Pegasus Invoice Generator</h1>
      <textarea
        id="orderMessage"
        placeholder="Paste your order message here..."
      ></textarea>
      <br />
      <div class="btn-group">
        <button onclick="generateInvoice()">Generate Invoice</button>
        <button class="pdf-btn-price" onclick="downloadPDF(true)">
          &#11015; Download PDF (With Prices)
        </button>
        <button class="pdf-btn-noprice" onclick="downloadPDF(false)">
          &#11015; Download PDF (No Prices)
        </button>
        <button onclick="sortBySize()" id="sortButton" style="display: none">
          Sort by Size
        </button>
      </div>
      <div
        style="margin: 10px 0; display: flex; align-items: center; gap: 10px"
      >
        <label for="customerInfoFontSize"
          ><strong>Customer Info Font Size:</strong></label
        >
        <select id="customerInfoFontSize" style="width: auto; padding: 8px">
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12" selected>12</option>
          <option value="14">14</option>
          <option value="16">16</option>
        </select>
      </div>
      <div id="output" class="output">
        <h2></h2>
        <img
          src="https://ahmedessam139.github.io/Black-Pegasus-Invoice-Generator/logo.png"
          alt="Black Pegasus Logo"
          class="logo"
        />
        <div id="invoiceContent"></div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

      let orderID = null;
      let totalPrice = 0;
      let currentItems = [];

      // ── Arabic text utilities ────────────────────────────────────────────────
      function hasArabic(str) {
        return /[\u0600-\u06FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(str || "");
      }

      // Proper Arabic reshaper + bidi using the browser's own Intl/Canvas trick:
      // We render Arabic into a hidden canvas with RTL context, then read back the
      // glyph order that a proper bidi algorithm would produce.
      // For jsPDF we need the *visual* (display) order of characters.
      function reshapeArabic(str) {
        if (!str || !hasArabic(str)) return str;
        // Use a temporary canvas to get browser-rendered bidi text
        // Then extract it — browsers handle Arabic shaping natively
        const canvas = document.createElement("canvas");
        canvas.width = 1200;
        canvas.height = 60;
        const ctx = canvas.getContext("2d");
        ctx.font = "24px Arial";
        ctx.direction = "rtl";
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.fillText(str, 1190, 40);

        // We can't directly read glyphs from canvas, so instead we use
        // the Unicode Bidirectional Algorithm via a simple pure-JS approach:
        // split into segments, reverse RTL segments, return visual order.
        return bidiReorder(str);
      }

      // Pure-JS bidi reorder for mixed Arabic/Latin text
      function bidiReorder(text) {
        if (!text) return "";
        // Split text into runs of Arabic and non-Arabic
        const runs = [];
        let i = 0;
        while (i < text.length) {
          const isAr =
            /[\u0600-\u06FF\uFB50-\uFDFF\uFE70-\uFEFF\s\d\.,\-:()]/.test(
              text[i],
            ) && hasArabic(text.slice(i, i + 1));
          // Collect run
          let j = i;
          // Arabic run: collect Arabic + spaces/numbers adjacent
          if (hasArabic(text[i])) {
            while (
              j < text.length &&
              (hasArabic(text[j]) ||
                /[\s\d\u060C\u061B\u061F\u0021-\u002F\u003A-\u0040]/.test(
                  text[j],
                ))
            )
              j++;
            runs.push({ text: text.slice(i, j), rtl: true });
          } else {
            while (j < text.length && !hasArabic(text[j])) j++;
            runs.push({ text: text.slice(i, j), rtl: false });
          }
          i = j;
        }

        // For RTL base direction: reverse the runs order, keep each run's internal order
        // Arabic chars need Arabic joining forms — the font handles this if we pass Unicode codepoints
        // The key issue is just run-level reversal for display in LTR jsPDF
        const rtlRuns = runs
          .filter((r) => r.rtl)
          .map((r) => r.text)
          .reverse();
        const ltrRuns = runs.filter((r) => !r.rtl).map((r) => r.text);

        // If primarily Arabic, put Arabic first (RTL base)
        const arabicCount = (text.match(/[\u0600-\u06FF]/g) || []).length;
        if (arabicCount > text.length / 3) {
          return (
            rtlRuns.join(" ") + (ltrRuns.length ? " " + ltrRuns.join(" ") : "")
          );
        }
        return rtlRuns.join(" ") + ltrRuns.join(" ");
      }

      // ── Register Amiri font with jsPDF ───────────────────────────────────────
      function registerArabicFont(doc) {
        doc.addFileToVFS("Amiri-Regular.ttf", AMIRI_B64);
        doc.addFont("Amiri-Regular.ttf", "Amiri", "normal");
      }

      // Choose font based on content: Amiri for Arabic, helvetica for pure Latin
      function setFont(doc, str, bold) {
        if (hasArabic(str)) {
          doc.setFont("Amiri", "normal"); // Amiri has no bold subset here
        } else {
          doc.setFont("helvetica", bold ? "bold" : "normal");
        }
      }

      function getCustomerInfoFontSize() {
        const select = document.getElementById("customerInfoFontSize");
        return select ? parseInt(select.value, 10) || 10 : 10;
      }

      // ── PDF generation ───────────────────────────────────────────────────────
      function downloadPDF(withPrices) {
        if (!orderID) {
          alert("Please generate an invoice first.");
          return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
          unit: "mm",
          format: "a4",
          orientation: "portrait",
        });

        registerArabicFont(doc);

        const shippingFee =
          parseFloat(document.getElementById("shippingFee")?.value) || 0;
        const deliveryDays =
          document.getElementById("deliveryTime")?.value || "—";
        const grandTotal = totalPrice + shippingFee;
        const message = document.getElementById("orderMessage").value;
        const customerInfo = extractCustomerInfo(message);

        const pageW = doc.internal.pageSize.getWidth();
        const margin = 14;
        let y = 14;

        // ── Header ──────────────────────────────────────────────────────────
        doc.setTextColor(30, 30, 30);
        doc.setFontSize(18);
        doc.setFont("helvetica", "bold");
        doc.text("BLACK PEGASUS", pageW / 2, 12, { align: "center" });
        doc.setFontSize(12);
        doc.setFont("helvetica", "normal");
        doc.text(
          withPrices ? "Customer Invoice" : "Packing Slip",
          pageW / 2,
          20,
          { align: "center" },
        );
        y = 28;

        // ── Meta ────────────────────────────────────────────────────────────
        doc.setTextColor(80, 80, 80);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text("Order ID: " + orderID, margin, y);
        doc.text("Generated: " + generateTimestamp(), pageW - margin, y, {
          align: "right",
        });
        y += 5;
        doc.setDrawColor(200, 200, 200);
        doc.line(margin, y, pageW - margin, y);
        y += 6;

        // ── Customer Info (small table) ───────────────────────────────────────
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(30, 30, 30);
        doc.text("Customer Information", margin, y);
        y += 2;

        const infoRows = [
          ["Name", customerInfo.name || "—"],
          ["Phone", customerInfo.phone || "—"],
          ["Address", customerInfo.address || "—"],
          ["City", customerInfo.city || "—"],
          ["Notes", customerInfo.notes || "—"],
        ];
        const customerInfoFontSize = getCustomerInfoFontSize();

        // Render as a compact two-column table with minimal vertical padding
        doc.autoTable({
          startY: y,
          head: [["Field", "Value"]],
          body: infoRows.map(([l, v]) => [l, v || "—"]),
          margin: { left: margin, right: margin },
          styles: {
            fontSize: customerInfoFontSize,
            cellPadding: 1,
            minCellHeight: 0,
            halign: "left",
            valign: "middle",
            textColor: [30, 30, 30],
          },
          headStyles: {
            fillColor: [230, 230, 230],
            textColor: [0, 0, 0],
            fontStyle: "bold",
            fontSize: customerInfoFontSize,
          },
          theme: "grid",
          didParseCell: function (data) {
            // Value column: handle Arabic, multiline and right-align when needed
            if (data.column.index === 1 && data.section === "body") {
              const raw = String(data.cell.raw || "");
              if (hasArabic(raw)) {
                data.cell.styles.font = "Amiri";
                data.cell.styles.halign = "right";
                const reshaped = reshapeArabic(raw);
                data.cell.text = reshaped.split(/\r?\n/);
              } else if (raw.indexOf("\n") !== -1) {
                data.cell.text = raw.split(/\r?\n/);
              }
            }
            // Make field column slightly bolder
            if (data.column.index === 0 && data.section === "body") {
              data.cell.styles.fontStyle = "bold";
            }
          },
          columnStyles: {
            0: { cellWidth: 28 },
            1: { cellWidth: pageW - margin * 2 - 28 },
          },
        });

        y = doc.lastAutoTable.finalY + 2;

        // Draw a dashed separator and add a small space before items
        doc.setDrawColor(180, 180, 180);
        if (doc.setLineDash) {
          doc.setLineDash([2, 2], 0);
        } else if (doc.setDash) {
          doc.setDash(2, 2);
        }
        doc.setLineWidth(0.3);
        doc.line(margin, y, pageW - margin, y);
        // reset dash to solid
        if (doc.setLineDash) {
          doc.setLineDash([]);
        } else if (doc.setDash) {
          doc.setDash(0, 0);
        }
        y += 6;

        // ── Items table ──────────────────────────────────────────────────────
        doc.setFont("helvetica", "bold");
        doc.setFontSize(12);
        doc.setTextColor(30, 30, 30);
        doc.text("Order Items", margin, y);
        y += 4;

        const head = withPrices
          ? [["#", "Item Name", "Qty", "Size", "Unit Price", "Total", "Code"]]
          : [["#", "Item Name", "Qty", "Size", "Code"]];

        const body = currentItems.map((item, i) => {
          const qty = parseFloat(item.quantity) || 0;
          const price = parseFloat(item.unitPrice) || 0;
          const total = (qty * price).toFixed(2);
          const nameDisplay = hasArabic(item.name)
            ? reshapeArabic(item.name)
            : item.name;
          return withPrices
            ? [
                i + 1,
                nameDisplay,
                item.quantity,
                item.size,
                price,
                total,
                item.itemCode,
              ]
            : [i + 1, nameDisplay, item.quantity, item.size, item.itemCode];
        });

        const totalQty = currentItems.reduce(
          (s, it) => s + (parseFloat(it.quantity) || 0),
          0,
        );
        const totalSizes = calculateTotalSizes(currentItems);

        body.push(
          withPrices
            ? [
                "",
                "TOTAL",
                totalQty,
                totalSizes + "ml",
                "—",
                totalPrice.toFixed(2),
                "—",
              ]
            : ["", "TOTAL", totalQty, totalSizes + "ml", "—"],
        );

        doc.autoTable({
          startY: y,
          head: head,
          body: body,
          margin: { left: margin, right: margin },
          styles: {
            fontSize: 10,
            cellPadding: 4,
            halign: "center",
            valign: "middle",
            textColor: [0, 0, 0],
            fontStyle: "bold",
            lineColor: [0, 0, 0],
            lineWidth: 0.3,
          },
          headStyles: {
            fillColor: [200, 200, 200],
            textColor: [0, 0, 0],
            fontStyle: "bold",
          },
          alternateRowStyles: { fillColor: [250, 250, 250] },
          didParseCell: function (data) {
            // Last row = totals
            if (data.row.index === body.length - 1) {
              data.cell.styles.fontStyle = "bold";
              data.cell.styles.fillColor = [220, 220, 220];
              data.cell.styles.textColor = [0, 0, 0];
            }
            // Arabic cells: use Amiri font + right-align
            if (
              data.column.index === 1 &&
              data.row.index >= 0 &&
              data.section === "body"
            ) {
              const raw = String(data.cell.raw || "");
              if (hasArabic(raw)) {
                data.cell.styles.font = "Amiri";
                data.cell.styles.halign = "right";
              }
            }
          },
          columnStyles: withPrices
            ? { 1: { halign: "left", cellWidth: 55 } }
            : { 1: { halign: "left", cellWidth: 80 } },
        });

        y = doc.lastAutoTable.finalY + 8;

        // ── Pricing summary ──────────────────────────────────────────────────
        if (withPrices) {
          if (y + 35 > doc.internal.pageSize.getHeight() - 14) {
            doc.addPage();
            y = 14;
          }

          doc.setFont("helvetica", "normal");
          doc.setFontSize(11);
          doc.setTextColor(50, 50, 50);

          [
            ["Total Before Shipping", totalPrice.toFixed(2) + " EGP"],
            ["Shipping Fee", shippingFee.toFixed(2) + " EGP"],
            ["Estimated Delivery", deliveryDays + " days"],
          ].forEach(([label, val]) => {
            doc.text(label + ":", margin, y);
            doc.text(val, pageW - margin, y, { align: "right" });
            y += 5;
          });

          y += 2;
          doc.setFillColor(76, 175, 80);
          doc.setDrawColor(46, 125, 50);
          doc.roundedRect(margin, y, pageW - margin * 2, 14, 3, 3, "FD");
          doc.setTextColor(255, 255, 255);
          doc.setFont("helvetica", "bold");
          doc.setFontSize(14);
          doc.text(
            "Grand Total: " + grandTotal.toFixed(2) + " EGP",
            pageW / 2,
            y + 9,
            { align: "center" },
          );
          y += 18;
        }

        // ── Footer ───────────────────────────────────────────────────────────
        const pageCount = doc.internal.getNumberOfPages();
        for (let p = 1; p <= pageCount; p++) {
          doc.setPage(p);
          doc.setFontSize(8);
          doc.setFont("helvetica", "normal");
          doc.setTextColor(120, 120, 120);
          doc.text(
            "Black Pegasus — Thank you for your order!",
            pageW / 2,
            doc.internal.pageSize.getHeight() - 8,
            { align: "center" },
          );
        }

        const suffix = withPrices ? "invoice" : "packing_slip";
        doc.save(orderID + "_" + suffix + ".pdf");
      }

      // ── Invoice generation (web display — unchanged) ─────────────────────────
      function generateInvoice() {
        orderID = generateOrderID();
        const message = document.getElementById("orderMessage").value;
        if (!message) {
          alert("Please paste your order message.");
          return;
        }

        const outputDiv = document.getElementById("invoiceContent");
        outputDiv.innerHTML = "";

        const itemPattern =
          /(\d+)x\s(.*?)\((.*?)\)\s*-\s*(\d+)\s*EGP\s*\[Code:\s*(\w+)\]/g;
        const items = [];
        let match;
        while ((match = itemPattern.exec(message)) !== null) {
          items.push({
            quantity: parseInt(match[1]),
            name: match[2].trim(),
            size: match[3].trim(),
            unitPrice: parseFloat(match[4]),
            itemCode: match[5].trim(),
          });
        }
        currentItems = items;
        document.getElementById("sortButton").style.display =
          items.length > 0 ? "inline-block" : "none";

        const customerInfo = extractCustomerInfo(message);
        let tableHTML =
          "<table><tr><th>#</th><th>Item Name</th><th>Qty</th><th>Size</th><th>Unit Price (EGP)</th><th>Price (EGP)</th><th>Item Code</th></tr>";
        let totalQty = 0;
        totalPrice = 0;

        items.forEach((item, index) => {
          const qty = parseFloat(item.quantity) || 0;
          const price = parseFloat(item.unitPrice) || 0;
          const total = (qty * price).toFixed(2);
          totalQty += qty;
          totalPrice += parseFloat(total);
          tableHTML += `<tr><td>${index + 1}</td><td>${item.name}</td><td>${item.quantity}</td>
            <td>${item.size}</td><td>${item.unitPrice}</td><td>${total}</td><td>${item.itemCode}</td></tr>`;
        });

        const totalSizes = calculateTotalSizes(items);
        tableHTML += `<tr><td colspan="2"><strong>Total</strong></td><td><strong>${totalQty}</strong></td>
          <td><strong>${totalSizes}ml</strong></td><td>--</td><td><strong>${totalPrice.toFixed(2)}</strong></td><td>--</td></tr>`;
        tableHTML += "</table>";

        const shippingOptions = [
          0,
          ...Array.from({ length: 60 }, (_, i) => (i + 1) * 10),
        ]
          .map((f) => `<option value="${f}">${f} EGP</option>`)
          .join("");
        const deliveryOptions = Array.from({ length: 15 }, (_, i) => i + 1)
          .map((d) => `<option value="${d}">${d} days</option>`)
          .join("");

        outputDiv.innerHTML = `
          <div class="customer-info">
            <p><strong>Name:</strong> ${customerInfo.name || ""}</p>
            <p><strong>Phone:</strong> ${customerInfo.phone || ""}</p>
            <p><strong>Address:</strong> ${customerInfo.address || ""}</p>
            <p><strong>City:</strong> ${customerInfo.city || ""}</p>
            <p><strong>Notes:</strong> ${customerInfo.notes || ""}</p>
          </div>
          ${tableHTML}
          <div class="total-section">
            <div><label>Shipping Fee: </label>
              <select id="shippingFee" onchange="updateTotal()">${shippingOptions}</select></div>
            <div><label>Estimated Delivery: </label>
              <select id="deliveryTime">${deliveryOptions}</select></div>
            <div>
              <p><strong>Total Before Shipping:</strong> <span id="totalBefore"></span> EGP</p>
              <p><strong>Shipping Fee:</strong> <span id="shippingFeeDisplay">0</span> EGP</p>
            </div>
          </div>
          <div class="total-after-shipping"><strong>Grand Total : <span id="totalAfter"></span> EGP</strong></div>
          <p><strong>Invoice Generated:</strong> ${generateTimestamp()}</p>
          <p><strong>Order ID:</strong> ${orderID}</p>`;
        updateTotal();
      }

      function updateTotal() {
        const before = totalPrice.toFixed(2);
        const fee =
          parseFloat(document.getElementById("shippingFee").value) || 0;
        document.getElementById("totalBefore").innerText = before;
        document.getElementById("shippingFeeDisplay").innerText = fee;
        document.getElementById("totalAfter").innerText = (
          parseFloat(before) + fee
        ).toFixed(2);
      }

      function generateTimestamp() {
        const now = new Date();
        now.setHours(now.getHours() + 2);
        return now.toISOString().slice(0, 16).replace("T", " ");
      }

      function generateOrderID() {
        return (
          generateTimestamp().replace(/\D/g, "").slice(0, 12) +
          "-" +
          Math.floor(1000 + Math.random() * 9000)
        );
      }

      function extractCustomerInfo(message) {
        const info = { name: "", phone: "", address: "", city: "", notes: "" };
        if (!message) return info;

        const lines = message.split(/\r?\n/);
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (/^Name:/i.test(line)) {
            info.name = line.replace(/^Name:\s*/i, "").trim();
            continue;
          }
          if (/^Phone:/i.test(line)) {
            info.phone = line.replace(/^Phone:\s*/i, "").trim();
            continue;
          }
          if (/^Address:/i.test(line)) {
            let addr = line.replace(/^Address:\s*/i, "").trim();
            let j = i + 1;
            // Collect following lines until next known label or item line
            while (
              j < lines.length &&
              !/^(Name:|Phone:|City:|Notes:|\d+x\s)/i.test(lines[j].trim())
            ) {
              if (lines[j].trim() !== "") {
                addr += (addr ? "\n" : "") + lines[j].trim();
              }
              j++;
            }
            info.address = addr.trim();
            i = j - 1;
            continue;
          }
          if (/^City:/i.test(line)) {
            info.city = line.replace(/^City:\s*/i, "").trim();
            continue;
          }
          if (/^Notes:/i.test(line)) {
            let notes = line.replace(/^Notes:\s*/i, "").trim();
            let j = i + 1;
            while (j < lines.length) {
              notes += "\n" + lines[j];
              j++;
            }
            info.notes = notes.trim();
            break;
          }
        }
        return info;
      }

      function extractSizeNumber(sizeText) {
        const nums = sizeText.match(/\d+(?:\.\d+)?/g);
        return nums ? parseFloat(nums[0]) : 0;
      }

      function calculateTotalSizes(items) {
        return Math.round(
          items.reduce(
            (s, it) =>
              s + extractSizeNumber(it.size) * (parseFloat(it.quantity) || 0),
            0,
          ),
        );
      }

      function sortBySize() {
        if (!currentItems.length) {
          alert("No items to sort.");
          return;
        }
        currentItems = [...currentItems].sort(
          (a, b) => extractSizeNumber(a.size) - extractSizeNumber(b.size),
        );
        regenerateTable();
      }

      function regenerateTable() {
        const message = document.getElementById("orderMessage").value;
        const customerInfo = extractCustomerInfo(message);
        const outputDiv = document.getElementById("invoiceContent");
        outputDiv.innerHTML = "";

        let tableHTML =
          "<table><tr><th>#</th><th>Item Name</th><th>Qty</th><th>Size</th><th>Unit Price (EGP)</th><th>Price (EGP)</th><th>Item Code</th></tr>";
        let totalQty = 0;
        totalPrice = 0;

        currentItems.forEach((item, index) => {
          const qty = parseFloat(item.quantity) || 0;
          const price = parseFloat(item.unitPrice) || 0;
          const total = (qty * price).toFixed(2);
          totalQty += qty;
          totalPrice += parseFloat(total);
          tableHTML += `<tr><td>${index + 1}</td><td>${item.name}</td><td>${item.quantity}</td>
            <td>${item.size}</td><td>${item.unitPrice}</td><td>${total}</td><td>${item.itemCode}</td></tr>`;
        });

        const totalSizes = calculateTotalSizes(currentItems);
        tableHTML += `<tr><td colspan="2"><strong>Total</strong></td><td><strong>${totalQty}</strong></td>
          <td><strong>${totalSizes}ml</strong></td><td>--</td><td><strong>${totalPrice.toFixed(2)}</strong></td><td>--</td></tr>`;
        tableHTML += "</table>";

        const shippingOptions = [
          0,
          ...Array.from({ length: 60 }, (_, i) => (i + 1) * 10),
        ]
          .map((f) => `<option value="${f}">${f} EGP</option>`)
          .join("");
        const deliveryOptions = Array.from({ length: 15 }, (_, i) => i + 1)
          .map((d) => `<option value="${d}">${d} days</option>`)
          .join("");

        outputDiv.innerHTML = `
          <div class="customer-info">
            <p><strong>Name:</strong> ${customerInfo.name || ""}</p>
            <p><strong>Phone:</strong> ${customerInfo.phone || ""}</p>
            <p><strong>Address:</strong> ${customerInfo.address || ""}</p>
            <p><strong>City:</strong> ${customerInfo.city || ""}</p>
            <p><strong>Notes:</strong> ${customerInfo.notes || ""}</p>
          </div>
          ${tableHTML}
          <div class="total-section">
            <div><label>Shipping Fee: </label>
              <select id="shippingFee" onchange="updateTotal()">${shippingOptions}</select></div>
            <div><label>Estimated Delivery: </label>
              <select id="deliveryTime">${deliveryOptions}</select></div>
            <div>
              <p><strong>Total Before Shipping:</strong> <span id="totalBefore"></span> EGP</p>
              <p><strong>Shipping Fee:</strong> <span id="shippingFeeDisplay">0</span> EGP</p>
            </div>
          </div>
          <div class="total-after-shipping"><strong>Grand Total : <span id="totalAfter"></span> EGP</strong></div>
          <p><strong>Invoice Generated:</strong> ${generateTimestamp()}</p>
          <p><strong>Order ID:</strong> ${orderID}</p>`;
        updateTotal();
      }
    </script>
  </body>
</html>
