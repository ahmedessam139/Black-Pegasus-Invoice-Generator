<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Pegasus Invoice Generator</title>
    <style>
      body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 20px; }
      .container { max-width: 800px; margin: auto; background-color: #fff; padding: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 10px; }
      textarea { width: 100%; height: 150px; margin-bottom: 20px; padding: 10px; }
      input, textarea, select { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
      button { padding: 10px 20px; margin: 5px 0; background-color: #4caf50; color: white; border: none; cursor: pointer; border-radius: 5px; }
      button:hover { background-color: #45a049; }
      button.pdf-btn-price  { background-color: #1976d2; }
      button.pdf-btn-price:hover { background-color: #1565c0; }
      button.pdf-btn-noprice { background-color: #7b1fa2; }
      button.pdf-btn-noprice:hover { background-color: #6a1b9a; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
      table, th, td { border: 1px solid #ccc; }
      th, td { padding: 5px; text-align: center; font-size: 16px; }
      input { width: 100%; border: none; background: transparent; text-align: center; }
      .total-section { display: flex; justify-content: space-between; margin-top: 20px; }
      .total-after-shipping { background: linear-gradient(135deg, #4caf50, #45a049); color: white;
        padding: 12px 16px; border-radius: 8px; font-weight: bold; font-size: 18px; text-align: center;
        box-shadow: 0 4px 8px rgba(76,175,80,0.3); margin: 10px 0; border: 2px solid #2e7d32; }
      select { padding: 5px; }
      h1 { text-align: center; color: #333; }
      .customer-info { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; background-color: #f9f9f9; }
      .customer-info p { margin: 5px 0; }
      .logo { display: block; margin: 0 auto; width: 230px; }
      .output { padding: 20px; margin-top: 20px; }
      .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div class="container" id="invoiceContainer">
      <h1>Black Pegasus Invoice Generator</h1>
      <textarea id="orderMessage" placeholder="Paste your order message here..."></textarea>
      <br />
      <div class="btn-group">
        <button onclick="generateInvoice()">Generate Invoice</button>
        <button class="pdf-btn-price"   onclick="downloadPDF(true)">&#11015; Download PDF (With Prices)</button>
        <button class="pdf-btn-noprice" onclick="downloadPDF(false)">&#11015; Download PDF (No Prices)</button>
        <button onclick="sortBySize()" id="sortButton" style="display:none">Sort by Size</button>
      </div>
      <div id="output" class="output">
        <h2></h2>
        <img src="https://ahmedessam139.github.io/Black-Pegasus-Invoice-Generator/logo.png"
             alt="Black Pegasus Logo" class="logo" />
        <div id="invoiceContent"></div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──────────────────────────────────────────────────────────────────
let orders = [];

// ── UI Helpers ─────────────────────────────────────────────────────────────
function setStatus(msg, type = 'info') {
  const sb = document.getElementById('status-bar');
  sb.textContent = msg;
  sb.className = type;
  sb.style.display = msg ? 'block' : 'none';
}

function showProgress(title, pct, label) {
  document.getElementById('progress-overlay').classList.add('show');
  document.getElementById('progress-title').textContent = title;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

function hideProgress() {
  document.getElementById('progress-overlay').classList.remove('show');
}

// ── Drag & Drop ────────────────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
const fi = document.getElementById('file-input');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
dz.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fi.click(); });
fi.addEventListener('change', e => handleFiles(e.target.files));

// ── File Handling ──────────────────────────────────────────────────────────
async function handleFiles(files) {
  const arr = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (!arr.length) { setStatus('No PDF files found in selection.', 'err'); return; }

  setStatus(`Reading ${arr.length} file(s)…`, 'info');
  let loaded = 0, skipped = 0;

  for (let i = 0; i < arr.length; i++) {
    const file = arr[i];
    showProgress('Parsing packing slips…', Math.round(((i + 1) / arr.length) * 100), `${file.name}`);
    try {
      const order = await parsePDF(file);
      if (order) {
        const exists = orders.find(o => o.orderId === order.orderId);
        if (!exists) {
          orders.push(order);
          loaded++;
        } else {
          skipped++;
        }
      }
    } catch (e) {
      console.error('Error parsing', file.name, e);
    }
  }

  fi.value = '';
  hideProgress();
  render();

  const msgs = [];
  if (loaded) msgs.push(`${loaded} slip(s) loaded`);
  if (skipped) msgs.push(`${skipped} duplicate(s) skipped`);
  setStatus(msgs.join(', ') + '. Total: ' + orders.length + ' orders.', 'ok');
}

// ── PDF Parsing ────────────────────────────────────────────────────────────
// Strategy: use pdf.js word positions (x coordinate) to reconstruct table columns.
// Column x-ranges (in PDF points, page width ~595):
//   #    : x < 70
//   Name : 70 <= x < 280
//   Qty  : 280 <= x < 370
//   Size : 370 <= x < 480
//   Code : x >= 480

async function parsePDF(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

  let allWords = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const vp = page.getViewport({ scale: 1 });
    const tc = await page.getTextContent();
    // Normalise y: pdf.js gives y from bottom; convert to top-down
    const pageH = vp.height;
    for (const item of tc.items) {
      if (!item.str || !item.str.trim()) continue;
      const tx = item.transform[4];
      const ty = pageH - item.transform[5];
      allWords.push({ text: item.str.trim(), x: tx, y: ty });
    }
  }

  // ── Extract Order ID ──────────────────────────────────────────────────────
  const fullText = allWords.map(w => w.text).join(' ');
  const orderIdMatch = fullText.match(/Order\s+ID[:\s]+([^\s]+)/i);
  const orderId = orderIdMatch ? orderIdMatch[1] : ('ORDER-' + Date.now());

  // ── Extract customer fields by looking for label words then value words on same row ──
  function getValueAfterLabel(labelPattern, allWords) {
    const labelWords = allWords.filter(w => labelPattern.test(w.text));
    if (!labelWords.length) return '';
    const labelY = labelWords[0].y;
    const labelX = labelWords[0].x;
    // Collect words on same row (±4px) that are to the right of the label
    const rowWords = allWords
      .filter(w => Math.abs(w.y - labelY) < 4 && w.x > labelX + 5)
      .sort((a, b) => a.x - b.x);
    return rowWords.map(w => w.text).join(' ').trim();
  }

  const customerName = getValueAfterLabel(/^Name:?$/i, allWords);
  const phone = getValueAfterLabel(/^Phone:?$/i, allWords);

  // City: value is on the SAME row but far to the right (Arabic RTL layout)
  const cityLabelWords = allWords.filter(w => /^City:?$/i.test(w.text));
  let city = '';
  if (cityLabelWords.length) {
    const cityY = cityLabelWords[0].y;
    // The city name appears ~10–12 px lower (next line), on the right side of page
    // OR on same row. Let's grab anything within 15px vertically after City: label
    const cityRowWords = allWords
      .filter(w => w.y >= cityY - 2 && w.y <= cityY + 15 && w.x > 200)
      .sort((a, b) => a.x - b.x);
    city = cityRowWords.map(w => w.text).join(' ').replace(/^[-\s]+/, '').trim();
  }

  // Notes: collect all words on Notes row that are NOT "Notes:"
  const notesLabelWords = allWords.filter(w => /^Notes:?$/i.test(w.text));
  let notes = '';
  if (notesLabelWords.length) {
    const notesY = notesLabelWords[0].y;
    const notesRowWords = allWords
      .filter(w => w.y >= notesY - 2 && w.y <= notesY + 15 && !/^Notes:?$/i.test(w.text))
      .sort((a, b) => a.x - b.x);
    notes = notesRowWords.map(w => w.text).join(' ').trim();
  }

  // ── Find "Order Items" header row ─────────────────────────────────────────
  // Look for word "#" which is the table header — items start after it
  const hashWord = allWords.find(w => w.text === '#');
  if (!hashWord) return { orderId, customerName, phone, city, notes, items: [], fileName: file.name };

  const headerY = hashWord.y;

  // ── Determine column X boundaries from header row ─────────────────────────
  // Header words: # | Item Name | Qty | Size | Code
  const headerWords = allWords.filter(w => Math.abs(w.y - headerY) < 6);
  // Find x positions of each column header
  const colHash = headerWords.find(w => w.text === '#');
  const colQty  = headerWords.find(w => /^Qty$/i.test(w.text));
  const colSize = headerWords.find(w => /^Size$/i.test(w.text));
  const colCode = headerWords.find(w => /^Code$/i.test(w.text));

  // Fallback x values
  const xHash = colHash ? colHash.x : 55;
  const xQty  = colQty  ? colQty.x  : 310;
  const xSize = colSize ? colSize.x  : 390;
  const xCode = colCode ? colCode.x  : 480;

  const xNameStart = xHash + 15;  // name starts just after #

  // ── Collect item rows (below header, above TOTAL) ─────────────────────────
  const totalWord = allWords.find(w => w.text === 'TOTAL' && w.y > headerY);
  const bottomY = totalWord ? totalWord.y : 9999;

  const itemWords = allWords.filter(w => w.y > headerY + 5 && w.y < bottomY - 2);

  // Group words by row (cluster by y ±5px)
  const rows = [];
  for (const word of itemWords) {
    const existingRow = rows.find(r => Math.abs(r.y - word.y) < 5);
    if (existingRow) {
      existingRow.words.push(word);
    } else {
      rows.push({ y: word.y, words: [word] });
    }
  }
  rows.sort((a, b) => a.y - b.y);

  // ── Parse each row into # / name / qty / size / code ─────────────────────
  const items = [];
  for (const row of rows) {
    const ws = row.words.sort((a, b) => a.x - b.x);

    // A valid item row must have a # column word that is a small integer
    const numWord = ws.find(w => w.x < xNameStart && /^\d+$/.test(w.text));
    if (!numWord) continue;
    const num = parseInt(numWord.text);

    // Name: words between xNameStart and xQty-10
    const nameWords = ws.filter(w => w.x >= xNameStart && w.x < xQty - 5).sort((a,b) => a.x - b.x);
    const name = nameWords.map(w => w.text).join(' ').trim();
    if (!name) continue;

    // Qty: words around xQty column (±30px tolerance)
    const qtyWords = ws.filter(w => w.x >= xQty - 20 && w.x < xSize - 10);
    const qtyStr = qtyWords.map(w => w.text).join('').trim();
    const qty = parseInt(qtyStr) || 1;

    // Size: words around xSize column
    const sizeWords = ws.filter(w => w.x >= xSize - 10 && w.x < xCode - 5).sort((a,b) => a.x - b.x);
    let size = sizeWords.map(w => w.text).join('').trim();
    // Normalize reversed "ml100" → "100ml"
    size = size.replace(/^ml(\d+)$/i, '$1ml').replace(/^(\d+)ml$/i, '$1ml');

    // Code: words from xCode onwards
    const codeWords = ws.filter(w => w.x >= xCode - 10).sort((a,b) => a.x - b.x);
    const code = codeWords.map(w => w.text).join('').trim();

    if (name && code) {
      items.push({ num, name, qty, size, code });
    }
  }

  return { orderId, customerName, phone, city, notes, items, fileName: file.name };
}

// ── Aggregation ────────────────────────────────────────────────────────────
function getAggregated() {
  const map = {};
  for (const order of orders) {
    for (const item of order.items) {
      const key = item.code + '__' + item.size;
      if (!map[key]) {
        map[key] = { name: item.name, code: item.code, size: item.size, totalQty: 0, orderIds: [] };
      }
      map[key].totalQty += item.qty;
      if (!map[key].orderIds.includes(order.orderId)) map[key].orderIds.push(order.orderId);
    }
  }
  return Object.values(map).sort((a, b) => b.totalQty - a.totalQty);
}

// ── Render UI ──────────────────────────────────────────────────────────────
function render() {
  const agg = getAggregated();
  const totalItems = agg.reduce((s, i) => s + i.totalQty, 0);
  const hasData = orders.length > 0;

  document.getElementById('metrics').style.display = hasData ? 'grid' : 'none';
  document.getElementById('m-orders').textContent = orders.length;
  document.getElementById('m-products').textContent = agg.length;
  document.getElementById('m-items').textContent = totalItems;

  // Files list
  const fc = document.getElementById('files-card');
  fc.style.display = hasData ? 'block' : 'none';
  document.getElementById('files-list').innerHTML = orders.map(o => `
    <div class="slip-row">
      <span class="slip-filename" title="${o.fileName}">${o.fileName}</span>
      <span class="slip-id">${o.orderId}</span>
      <span class="slip-name">${o.customerName}</span>
      <span class="badge ${o.items.length === 0 ? 'warn' : ''}">${o.items.length} item${o.items.length !== 1 ? 's' : ''}</span>
      <button class="remove-btn" onclick="removeOrder('${o.orderId}')" aria-label="Remove ${o.orderId}">×</button>
    </div>
  `).join('');

  // Items list
  const ic = document.getElementById('items-card');
  ic.style.display = agg.length ? 'block' : 'none';
  document.getElementById('items-count').textContent = agg.length + ' products';
  document.getElementById('items-list').innerHTML = agg.map(item => `
    <div class="item-row">
      <div class="qty-bubble">${item.totalQty}</div>
      <div style="flex:1;min-width:0">
        <div class="item-name">${item.name}</div>
        <div class="item-sub">${item.orderIds.length} order${item.orderIds.length > 1 ? 's' : ''}: ${item.orderIds.join(' · ')}</div>
      </div>
      <span class="size-tag">${item.size}</span>
      <span class="code-tag">${item.code}</span>
    </div>
  `).join('');

  // Actions
  document.getElementById('actions-row').style.display = agg.length ? 'flex' : 'none';
}

function removeOrder(id) {
  orders = orders.filter(o => o.orderId !== id);
  render();
  if (!orders.length) setStatus('', '');
}

function clearAll() {
  orders = [];
  render();
  setStatus('', '');
}

// ── PDF Generation: Worker Sheet ───────────────────────────────────────────
function generateWorkerPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const agg = getAggregated();
  const W = 210, M = 14;
  const now = new Date().toLocaleDateString('en-GB');

  // Header
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(22);
  doc.text('BLACK PEGASUS', W / 2, 22, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text('Worker Preparation Sheet — Items to Pick & Pack', W / 2, 30, { align: 'center' });
  doc.setFontSize(8);
  doc.setTextColor(120);
  doc.text(`Generated: ${now}   ·   Orders: ${orders.length}   ·   Total pieces: ${agg.reduce((s,i)=>s+i.totalQty,0)}`, W/2, 37, { align: 'center' });
  doc.setTextColor(0);

  // Divider
  doc.setDrawColor(60); doc.setLineWidth(0.5);
  doc.line(M, 41, W - M, 41);

  // Column headers
  let y = 49;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(100);
  doc.text('QTY',  M + 5, y, { align: 'center' });
  doc.text('PRODUCT NAME', M + 22, y);
  doc.text('SIZE',  M + 130, y);
  doc.text('CODE',  M + 162, y);
  doc.setTextColor(0);
  y += 2;
  doc.setDrawColor(180); doc.setLineWidth(0.3);
  doc.line(M, y, W - M, y);
  y += 7;

  // Rows
  doc.setFont('helvetica', 'normal'); doc.setFontSize(11);
  for (let i = 0; i < agg.length; i++) {
    const item = agg[i];
    if (y > 272) {
      doc.addPage();
      y = 18;
      // Repeat mini-header
      doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(100);
      doc.text('QTY', M + 5, y, { align: 'center' });
      doc.text('PRODUCT NAME', M + 22, y);
      doc.text('SIZE', M + 130, y);
      doc.text('CODE', M + 162, y);
      doc.setTextColor(0);
      y += 2; doc.setDrawColor(180);
      doc.line(M, y, W - M, y);
      y += 7;
    }

    // Alternate row shading
    if (i % 2 === 0) {
      doc.setFillColor(248, 248, 248);
      doc.rect(M, y - 5, W - 2 * M, 9, 'F');
    }

    doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
    doc.text(String(item.totalQty), M + 5, y, { align: 'center' });

    doc.setFont('helvetica', 'normal'); doc.setFontSize(11);
    doc.text(item.name, M + 22, y);
    doc.text(item.size, M + 130, y);

    doc.setFont('courier', 'normal'); doc.setFontSize(9);
    doc.text(item.code, M + 162, y);

    y += 3;
    doc.setDrawColor(220); doc.setLineWidth(0.2);
    doc.line(M, y, W - M, y);
    y += 7;
  }

  // Footer
  doc.setFont('helvetica', 'italic'); doc.setFontSize(8); doc.setTextColor(160);
  doc.text('Black Pegasus — Internal Use Only', W/2, 288, { align: 'center' });

  doc.save(`BP_worker_sheet_${now.replace(/\//g, '-')}.pdf`);
}

// ── PDF Generation: Individual Slips ──────────────────────────────────────
function generateIndividualPDFs() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, M = 16;
  const now = new Date().toLocaleDateString('en-GB');

  orders.forEach((order, idx) => {
    if (idx > 0) doc.addPage();

    // Header
    doc.setFont('helvetica', 'bold'); doc.setFontSize(22);
    doc.text('BLACK PEGASUS', W/2, 22, { align: 'center' });
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    doc.text('Packing Slip (No Prices)', W/2, 30, { align: 'center' });
    doc.setFontSize(8); doc.setTextColor(100);
    doc.text(`Order ID: ${order.orderId}`, M, 38);
    doc.text(`Generated: ${now}`, W - M, 38, { align: 'right' });
    doc.setTextColor(0);

    doc.setDrawColor(60); doc.setLineWidth(0.5);
    doc.line(M, 42, W - M, 42);

    // Customer info
    let y = 52;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
    doc.text('Customer Information', M, y);
    y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);

    const fields = [
      ['Name',    order.customerName],
      ['Phone',   order.phone],
      ['City',    order.city],
      ['Notes',   order.notes],
    ];
    for (const [label, value] of fields) {
      if (!value) continue;
      doc.setFont('helvetica', 'bold');
      doc.text(label + ':', M, y);
      doc.setFont('helvetica', 'normal');
      // Handle Arabic/RTL: if text contains Arabic, render right-aligned
      const isAr = /[\u0600-\u06FF]/.test(value);
      if (isAr) {
        doc.text(value, W - M, y, { align: 'right' });
      } else {
        doc.text(value, M + 28, y);
      }
      y += 7;
    }

    y += 2;
    doc.setDrawColor(180); doc.setLineWidth(0.3);
    doc.line(M, y, W - M, y);
    y += 7;

    // Table header
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(100);
    doc.text('#',        M + 4,  y, { align: 'center' });
    doc.text('Item Name', M + 14, y);
    doc.text('Qty',      M + 112, y, { align: 'center' });
    doc.text('Size',     M + 130, y);
    doc.text('Code',     M + 162, y);
    doc.setTextColor(0);
    y += 2;
    doc.setDrawColor(200);
    doc.line(M, y, W - M, y);
    y += 6;

    // Items
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    let totalQty = 0;
    order.items.forEach((item, i) => {
      if (y > 265) { doc.addPage(); y = 20; }
      if (i % 2 === 0) {
        doc.setFillColor(249, 249, 249);
        doc.rect(M, y - 4.5, W - 2*M, 8, 'F');
      }
      doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
      doc.text(String(i + 1), M + 4, y, { align: 'center' });
      doc.text(item.name, M + 14, y);
      doc.setFont('helvetica', 'bold');
      doc.text(String(item.qty), M + 112, y, { align: 'center' });
      doc.setFont('helvetica', 'normal');
      doc.text(item.size, M + 130, y);
      doc.setFont('courier', 'normal'); doc.setFontSize(9);
      doc.text(item.code, M + 162, y);
      totalQty += item.qty;
      y += 2;
      doc.setDrawColor(230); doc.setLineWidth(0.2);
      doc.line(M, y, W - M, y);
      y += 6;
    });

    // Total
    y += 3;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
    doc.text(`TOTAL:  ${order.items.length} line(s)   ${totalQty} piece(s)`, W - M, y, { align: 'right' });

    // Footer
    doc.setFont('helvetica', 'italic'); doc.setFontSize(8); doc.setTextColor(160);
    doc.text('Black Pegasus — Thank you for your order!', W/2, 288, { align: 'center' });
    doc.setTextColor(0);
  });

  doc.save(`BP_individual_slips_${now.replace(/\//g, '-')}.pdf`);
}
</script>
